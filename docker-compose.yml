services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: max_reps
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U max_reps"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/rails server -b 0.0.0.0
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://max_reps:password@db:5432/max_reps_development
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  css:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/rails tailwindcss:watch
    tty: true
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development

volumes:
  postgres_data:
  bundle_cache:
